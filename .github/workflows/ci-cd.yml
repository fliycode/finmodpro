name: FinModPro CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sanity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show workspace
        run: |
          pwd
          ls -la
          echo "workflow started"

      - name: Python version
        run: python --version

      - name: Node version
        run: node --version
