x-default-logging: &default-logging
  driver: json-file
  options:
    max-size: "${DOCKER_LOG_MAX_SIZE:-10m}"
    max-file: "${DOCKER_LOG_MAX_FILE:-3}"

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://127.0.0.1:8000}
    ports:
      - "5173:80"
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      backend:
        condition: service_started

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      APP_ENV: production
      DJANGO_DEBUG: ${DJANGO_DEBUG:-false}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-change-me-in-.env.backend}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-47.85.103.76,127.0.0.1,localhost}
      DJANGO_CORS_ALLOWED_ORIGINS: ${DJANGO_CORS_ALLOWED_ORIGINS:-http://47.85.103.76:5173,http://127.0.0.1:5173,http://localhost:5173}
      DJANGO_CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS:-http://47.85.103.76:5173,http://127.0.0.1:5173,http://localhost:5173}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-jwt-in-.env.backend}
      DB_ENGINE: ${DB_ENGINE:-mysql}
      DB_NAME: ${DB_NAME:-finmodpro}
      DB_HOST: mysql
      DB_PORT: ${DB_PORT:-3306}
      DB_USER: ${DB_USER:-finmodpro}
      DB_PASSWORD: ${DB_PASSWORD:-finmodpro}
      DB_CONN_MAX_AGE: ${DB_CONN_MAX_AGE:-60}
      REDIS_ENABLED: "true"
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_DB: ${REDIS_DB:-0}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
      CELERY_TASK_ALWAYS_EAGER: ${CELERY_TASK_ALWAYS_EAGER:-false}
      CELERY_TASK_EAGER_PROPAGATES: ${CELERY_TASK_EAGER_PROPAGATES:-true}
      CELERY_TASK_STORE_EAGER_RESULT: ${CELERY_TASK_STORE_EAGER_RESULT:-false}
      RAG_RETRIEVAL_BACKEND: ${RAG_RETRIEVAL_BACKEND:-llamaindex}
      CHAT_RETRIEVAL_BACKEND: ${CHAT_RETRIEVAL_BACKEND:-llamaindex}
      GRAPH_BACKEND: ${GRAPH_BACKEND:-disabled}
      LLAMAINDEX_STORAGE_DIR: ${LLAMAINDEX_STORAGE_DIR:-/app/storage/llamaindex}
      LITELLM_INTERNAL_URL: ${LITELLM_INTERNAL_URL:-http://litellm:4000}
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-}
      LIGHTRAG_INTERNAL_URL: ${LIGHTRAG_INTERNAL_URL:-http://lightrag:9621}
      LIGHTRAG_SYNC_ENABLED: ${LIGHTRAG_SYNC_ENABLED:-false}
      LIGHTRAG_GRAPH_STORAGE: ${LIGHTRAG_GRAPH_STORAGE:-Neo4JStorage}
      LIGHTRAG_CHAT_RETRIEVAL_ENABLED: ${LIGHTRAG_CHAT_RETRIEVAL_ENABLED:-true}
      LIGHTRAG_CHAT_MODE: ${LIGHTRAG_CHAT_MODE:-mix}
      LIGHTRAG_CHAT_TOP_K: ${LIGHTRAG_CHAT_TOP_K:-5}
      NEO4J_URI: ${NEO4J_URI:-bolt://neo4j:7687}
      NEO4J_USERNAME: ${NEO4J_USERNAME:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-change-me-neo4j}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      MILVUS_URI: ${MILVUS_URI:-http://milvus:19530}
      MILVUS_COLLECTION_NAME: ${MILVUS_COLLECTION_NAME:-knowledgebase_document_chunks}
      KB_CHUNK_SIZE: ${KB_CHUNK_SIZE:-400}
      KB_CHUNK_OVERLAP: ${KB_CHUNK_OVERLAP:-50}
      KB_EMBEDDING_DIMENSION: ${KB_EMBEDDING_DIMENSION:-64}
      UNSTRUCTURED_API_URL: ${UNSTRUCTURED_API_URL:-http://unstructured-api:8000}
      UNSTRUCTURED_API_KEY: ${UNSTRUCTURED_API_KEY:-}
      UNSTRUCTURED_TIMEOUT_SECONDS: ${UNSTRUCTURED_TIMEOUT_SECONDS:-30}
      UNSTRUCTURED_PDF_STRATEGY: ${UNSTRUCTURED_PDF_STRATEGY:-fast}
      UNSTRUCTURED_DOCX_STRATEGY: ${UNSTRUCTURED_DOCX_STRATEGY:-fast}
      UNSTRUCTURED_PDF_FALLBACK_ENABLED: ${UNSTRUCTURED_PDF_FALLBACK_ENABLED:-true}
      MEDIA_ROOT: ${MEDIA_ROOT:-/app/media}
    ports:
      - "8000:8000"
    volumes:
      - backend_media:/app/media
      - backend_storage:/app/storage
      - ./deploy/litellm:/deploy/litellm
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      litellm:
        condition: service_started
      milvus:
        condition: service_started
      unstructured-api:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import sys, urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health/', timeout=5); sys.exit(0)\""]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 45s

  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["celery", "-A", "config", "worker", "-l", "info", "--concurrency", "1"]
    environment:
      APP_ENV: production
      DJANGO_DEBUG: ${DJANGO_DEBUG:-false}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-change-me-in-.env.backend}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-47.85.103.76,127.0.0.1,localhost}
      DJANGO_CORS_ALLOWED_ORIGINS: ${DJANGO_CORS_ALLOWED_ORIGINS:-http://47.85.103.76:5173,http://127.0.0.1:5173,http://localhost:5173}
      DJANGO_CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS:-http://47.85.103.76:5173,http://127.0.0.1:5173,http://localhost:5173}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-jwt-in-.env.backend}
      DB_ENGINE: ${DB_ENGINE:-mysql}
      DB_NAME: ${DB_NAME:-finmodpro}
      DB_HOST: mysql
      DB_PORT: ${DB_PORT:-3306}
      DB_USER: ${DB_USER:-finmodpro}
      DB_PASSWORD: ${DB_PASSWORD:-finmodpro}
      DB_CONN_MAX_AGE: ${DB_CONN_MAX_AGE:-60}
      REDIS_ENABLED: "true"
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_DB: ${REDIS_DB:-0}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
      CELERY_TASK_ALWAYS_EAGER: ${CELERY_TASK_ALWAYS_EAGER:-false}
      CELERY_TASK_EAGER_PROPAGATES: ${CELERY_TASK_EAGER_PROPAGATES:-true}
      CELERY_TASK_STORE_EAGER_RESULT: ${CELERY_TASK_STORE_EAGER_RESULT:-false}
      RAG_RETRIEVAL_BACKEND: ${RAG_RETRIEVAL_BACKEND:-llamaindex}
      CHAT_RETRIEVAL_BACKEND: ${CHAT_RETRIEVAL_BACKEND:-llamaindex}
      GRAPH_BACKEND: ${GRAPH_BACKEND:-disabled}
      LLAMAINDEX_STORAGE_DIR: ${LLAMAINDEX_STORAGE_DIR:-/app/storage/llamaindex}
      LITELLM_INTERNAL_URL: ${LITELLM_INTERNAL_URL:-http://litellm:4000}
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-}
      LIGHTRAG_INTERNAL_URL: ${LIGHTRAG_INTERNAL_URL:-http://lightrag:9621}
      LIGHTRAG_SYNC_ENABLED: ${LIGHTRAG_SYNC_ENABLED:-false}
      LIGHTRAG_GRAPH_STORAGE: ${LIGHTRAG_GRAPH_STORAGE:-Neo4JStorage}
      LIGHTRAG_CHAT_RETRIEVAL_ENABLED: ${LIGHTRAG_CHAT_RETRIEVAL_ENABLED:-true}
      LIGHTRAG_CHAT_MODE: ${LIGHTRAG_CHAT_MODE:-mix}
      LIGHTRAG_CHAT_TOP_K: ${LIGHTRAG_CHAT_TOP_K:-5}
      NEO4J_URI: ${NEO4J_URI:-bolt://neo4j:7687}
      NEO4J_USERNAME: ${NEO4J_USERNAME:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-change-me-neo4j}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      MILVUS_URI: ${MILVUS_URI:-http://milvus:19530}
      MILVUS_COLLECTION_NAME: ${MILVUS_COLLECTION_NAME:-knowledgebase_document_chunks}
      KB_CHUNK_SIZE: ${KB_CHUNK_SIZE:-400}
      KB_CHUNK_OVERLAP: ${KB_CHUNK_OVERLAP:-50}
      KB_EMBEDDING_DIMENSION: ${KB_EMBEDDING_DIMENSION:-64}
      UNSTRUCTURED_API_URL: ${UNSTRUCTURED_API_URL:-http://unstructured-api:8000}
      UNSTRUCTURED_API_KEY: ${UNSTRUCTURED_API_KEY:-}
      UNSTRUCTURED_TIMEOUT_SECONDS: ${UNSTRUCTURED_TIMEOUT_SECONDS:-30}
      UNSTRUCTURED_PDF_STRATEGY: ${UNSTRUCTURED_PDF_STRATEGY:-fast}
      UNSTRUCTURED_DOCX_STRATEGY: ${UNSTRUCTURED_DOCX_STRATEGY:-fast}
      UNSTRUCTURED_PDF_FALLBACK_ENABLED: ${UNSTRUCTURED_PDF_FALLBACK_ENABLED:-true}
      MEDIA_ROOT: ${MEDIA_ROOT:-/app/media}
    volumes:
      - backend_media:/app/media
      - backend_storage:/app/storage
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
      litellm:
        condition: service_started
      milvus:
        condition: service_started
      unstructured-api:
        condition: service_started

  unstructured-api:
    build:
      context: ./deploy/unstructured-light
      dockerfile: Dockerfile
    environment:
      UNSTRUCTURED_PARALLEL_MODE_ENABLED: "false"
    mem_limit: 512m
    mem_reservation: 128m
    restart: unless-stopped
    logging: *default-logging
    # Lightweight build (~300 MB vs official ~10 GB).  Only supports
    # strategy=fast, which is the FinModPro default.  No Detectron2,
    # PyTorch, Tesseract, or LibreOffice.

  mysql:
    image: mysql:8.4
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_DATABASE: ${DB_NAME:-finmodpro}
      MYSQL_USER: ${DB_USER:-finmodpro}
      MYSQL_PASSWORD: ${DB_PASSWORD:-finmodpro}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root-change-me}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped
    logging: *default-logging
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-root-change-me}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    logging: *default-logging

  litellm:
    image: docker.litellm.ai/berriai/litellm:main-latest
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
    volumes:
      - ./deploy/litellm/rendered.config.yaml:/app/config.yaml:ro
    ports:
      - "4000:4000"
    restart: unless-stopped
    logging: *default-logging

  etcd:
    image: quay.io/coreos/etcd:v3.5.18
    command: >-
      etcd
      --advertise-client-urls=http://etcd:2379
      --listen-client-urls=http://0.0.0.0:2379
      --data-dir=/etcd
    volumes:
      - etcd_data:/etcd
    restart: unless-stopped
    logging: *default-logging

  minio:
    image: minio/minio:RELEASE.2025-02-03T21-03-04Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped
    logging: *default-logging

  milvus:
    image: milvusdb/milvus:v2.5.5
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    ports:
      - "19530:19530"
      - "9091:9091"
    volumes:
      - milvus_data:/var/lib/milvus
    depends_on:
      etcd:
        condition: service_started
      minio:
        condition: service_started
    restart: unless-stopped
    logging: *default-logging

volumes:
  backend_media:
  backend_storage:
  mysql_data:
  redis_data:
  etcd_data:
  minio_data:
  milvus_data:
