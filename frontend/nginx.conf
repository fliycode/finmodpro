server {
    listen 80;
    server_name localhost;
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    root /usr/share/nginx/html;
    # Allow document uploads (PDF/DOCX up to 50MB)
    client_max_body_size 50M;
    index index.html;

    # Gzip Compression
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1000;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    location = /favicon.svg {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    location = /api/chat/ask/stream {
        set $backend_upstream http://backend:8000;
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        gzip off;
    }

    location /api/ {
        set $backend_upstream http://backend:8000;
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Optional health check
    location /healthz {
        return 200 "OK\n";
    }

    # LightRAG sidecar proxy — match only sub-paths, not the Vue route itself
    location ~ ^/admin/lightrag/(.+) {
        proxy_pass http://lightrag:9621/$1$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;

        # Rewrite absolute paths so SPA works under /admin/lightrag/
        sub_filter_once off;
        sub_filter_types application/javascript text/html text/css;
        sub_filter '"/webui/' '"/admin/lightrag/webui/';
        sub_filter "'/webui/" "'/admin/lightrag/webui/";
        sub_filter '"/api/' '"/admin/lightrag/api/';
        sub_filter "'/api/" "'/admin/lightrag/api/";
        sub_filter '"/docs' '"/admin/lightrag/docs';
        sub_filter '"/login' '"/admin/lightrag/login';
        sub_filter '"/auth-status' '"/admin/lightrag/auth-status';
        sub_filter '"/openapi.json' '"/admin/lightrag/openapi.json';
        sub_filter '"/redoc' '"/admin/lightrag/redoc';
        sub_filter '"/health' '"/admin/lightrag/health';
        sub_filter '"/static/' '"/admin/lightrag/static/';
    }
}
